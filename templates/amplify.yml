version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 24 && nvm use 24 && node --version && npm --version
        - npm ci
    build:
      commands:
        - npm run build
        - node scripts/inject-amplify-env.mjs
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
